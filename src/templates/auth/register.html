{% extends "base.html" %}
{% block title %}注册 — GEO Explorer{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm border p-8">
    <h1 class="text-2xl font-bold text-center mb-6">注册 GEO Explorer</h1>

    <form id="register-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
        <input type="email" name="email" required
          class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="you@company.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码 (≥8位)</label>
        <input type="password" name="password" required minlength="8"
          class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">组织名称</label>
        <input type="text" name="organization_name" required
          class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="你的公司或团队名称">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">组织标识 (URL slug)</label>
        <input type="text" name="slug"
          class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="自动生成">
      </div>
      <div class="flex items-start gap-2">
        <input type="checkbox" name="accepted_terms" required class="mt-1">
        <span class="text-xs text-gray-500">我同意服务条款和隐私政策</span>
      </div>

      <div id="error-msg" class="hidden text-sm text-red-600 bg-red-50 rounded-lg p-3"></div>

      <button type="submit"
        class="w-full py-2.5 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800 disabled:opacity-50">
        注册
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-6">
      已有账号？<a href="/login" class="text-blue-700 hover:underline">登录</a>
    </p>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  const errEl = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = '注册中...';
  errEl.classList.add('hidden');

  const form = new FormData(e.target);
  const body = {
    email: form.get('email'), password: form.get('password'),
    organization_name: form.get('organization_name'),
    slug: form.get('slug') || undefined,
    accepted_terms: form.get('accepted_terms') === 'on',
  };

  try {
    const resp = await fetch('/api/saas/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (resp.ok) {
      window.location.href = '/login?registered=1';
    } else {
      errEl.textContent = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
      errEl.classList.remove('hidden');
    }
  } catch (err) {
    errEl.textContent = '网络错误，请重试';
    errEl.classList.remove('hidden');
  }
  btn.disabled = false;
  btn.textContent = '注册';
});
</script>
{% endblock %}
