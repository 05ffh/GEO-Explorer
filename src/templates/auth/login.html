<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO Explorer — 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { primary: '#1E40AF', 'primary-light': '#3B82F6', surface: '#F8FAFC', text: '#1E3A8A' } } }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-surface font-sans min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
        <h1 class="font-heading text-xl font-bold text-text text-center mb-6">GEO Explorer</h1>
        <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">邮箱</label>
                <input type="email" name="email" id="email" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
                <input type="password" name="password" id="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent">
            </div>
            <div id="error-msg" class="text-sm text-red-600 hidden"></div>
            <button type="submit"
                    class="w-full py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition-colors duration-200 cursor-pointer">
                登录</button>
        </form>
        <p class="text-xs text-slate-400 text-center mt-4">GEO Explorer — 品牌 AI 可见度监测平台</p>
    </div>

    <script>
    async function handleLogin(e) {
        e.preventDefault();
        var btn = e.target.querySelector('button');
        var errEl = document.getElementById('error-msg');
        btn.textContent = '登录中...';
        btn.disabled = true;
        errEl.classList.add('hidden');

        try {
            var resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            if (!resp.ok) {
                var data = await resp.json();
                throw new Error(data.detail || '登录失败');
            }
            var data = await resp.json();
            localStorage.setItem('geo_token', data.access_token);
            localStorage.setItem('geo_user', data.user_name);
            // Set cookie for server-side auth on page loads
            document.cookie = 'geo_token=' + data.access_token + ';path=/;max-age=86400';
            window.location.href = '/';
        } catch (err) {
            errEl.textContent = err.message;
            errEl.classList.remove('hidden');
            btn.textContent = '登录';
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
