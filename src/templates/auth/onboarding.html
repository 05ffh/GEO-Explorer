{% extends "base.html" %}
{% block title %}欢迎 — GEO Explorer{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">欢迎, {{ vm["user_name"] }}!</h1>
    <p class="text-gray-500">你的组织已创建成功。开始使用 GEO Explorer。</p>
  </div>

  <div class="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
    <h2 class="text-lg font-semibold text-blue-900 mb-2">当前套餐: Free</h2>
    <p class="text-sm text-blue-700 mb-4">
      1 品牌 · 1 成员 · 90 天数据保留 · KPI 仪表盘
    </p>
    <div class="text-xs text-blue-600">
      邮箱未验证 — 验证后可创建 API Key 和导出数据
    </div>
  </div>

  <div class="space-y-4">
    <h3 class="font-semibold text-gray-800">快速开始</h3>
    <div class="grid grid-cols-2 gap-4">
      <a href="/" class="bg-white border rounded-lg p-4 hover:border-blue-500">
        <div class="font-medium text-sm">创建第一个品牌</div>
        <div class="text-xs text-gray-400 mt-1">添加品牌开始监测 AI 可见度</div>
      </a>
      <a href="/saas/plans" class="bg-white border rounded-lg p-4 hover:border-blue-500">
        <div class="font-medium text-sm">查看套餐</div>
        <div class="text-xs text-gray-400 mt-1">了解 Pro 和企业版功能</div>
      </a>
    </div>
  </div>
</div>
{% endblock %}
