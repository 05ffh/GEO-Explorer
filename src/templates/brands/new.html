{% extends "base.html" %}
{% from "partials/components/error_state.html" import error_state %}

{% block title %}创建品牌{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="font-heading text-2xl font-bold text-text mb-1">创建品牌</h1>
    <p class="text-sm text-slate-500 mb-6">填写品牌基本信息，然后启动 GEO 诊断</p>

    <form id="brand-form" class="space-y-4" onsubmit="submitBrand(event)">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">品牌名称 <span class="text-red-500">*</span></label>
            <input type="text" name="name" id="brand-name" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent"
                   placeholder="例如：星巴克">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">别名</label>
            <input type="text" name="aliases" id="brand-aliases"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent"
                   placeholder="逗号分隔，例如：Starbucks, 星巴克咖啡">
            <p class="text-xs text-slate-400 mt-1">用于 AI 回复中的品牌名识别</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">官网 URL</label>
            <input type="url" name="website" id="brand-website"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent"
                   placeholder="https://www.example.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">行业</label>
            <select name="industry" id="brand-industry"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent">
                <option value="">— 选择行业 —</option>
                <option value="restaurant_chain">餐饮连锁</option>
                <option value="banking">银行</option>
                <option value="insurance">保险</option>
                <option value="fintech">金融科技</option>
                <option value="healthcare">医疗健康</option>
                <option value="education">教育培训</option>
                <option value="automotive">汽车</option>
                <option value="retail">零售</option>
                <option value="saas">SaaS</option>
                <option value="technology">科技</option>
                <option value="travel">文旅</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">竞品（可选）</label>
            <input type="text" name="competitors" id="brand-competitors"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-light focus:border-transparent"
                   placeholder="逗号分隔，例如：瑞幸咖啡, Manner">
        </div>
        <div id="form-error" class="text-sm text-red-600 hidden"></div>
        <div class="flex gap-3">
            <button type="submit"
                    class="flex-1 py-2.5 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition-colors cursor-pointer">
                创建品牌
            </button>
            <a href="/diagnostics/new"
               class="px-4 py-2.5 bg-slate-100 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors cursor-pointer">
                取消
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
async function submitBrand(e) {
    e.preventDefault();
    var btn = document.querySelector('#brand-form button[type=submit]');
    var errEl = document.getElementById('form-error');
    btn.textContent = '创建中...';
    btn.disabled = true;
    errEl.classList.add('hidden');

    var aliases = document.getElementById('brand-aliases').value
        .split(',').map(function(s) { return s.trim(); }).filter(Boolean);

    try {
        var data = await geoFetch('/api/brands', {
            method: 'POST',
            body: JSON.stringify({
                name: document.getElementById('brand-name').value.trim(),
                aliases: aliases,
                industry: document.getElementById('brand-industry').value
            })
        });
        showToast('品牌已创建: ' + data.name, 'success');
        window.location.href = '/brands/' + data.id + '/preflight';
    } catch (err) {
        btn.textContent = '创建品牌';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
