{# brand_header_view.html — read-only brand info bar for dashboard #}
<div id="brand-header" class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
    <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
                <h1 class="font-heading text-xl font-bold text-text">{{ vm.brand.name }}</h1>
                {% if vm.brand.industry %}
                <span class="px-2.5 py-0.5 bg-blue-50 text-primary-light text-xs rounded-full font-medium">
                    {{ vm.brand.industry }}
                </span>
                {% endif %}
            </div>
            {% if vm.brand.aliases and vm.brand.aliases|length > 0 %}
            <p class="text-sm text-slate-500">别名: {{ vm.brand.aliases|join(', ') }}</p>
            {% endif %}
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
            <button hx-get="/brands/{{ vm.brand.id }}/edit"
                    hx-target="#brand-header"
                    hx-swap="outerHTML"
                    class="px-3 py-1.5 text-xs font-medium text-primary border border-primary/20 rounded-md hover:bg-primary/5 transition-colors cursor-pointer">
                编辑
            </button>
            <button onclick="triggerGTCollect('{{ vm.brand.id }}', this)"
                    class="gt-collect-btn px-3 py-1.5 text-xs font-medium text-white bg-cta rounded-md hover:opacity-90 transition-all cursor-pointer">
                采集 GT
            </button>
        </div>
    </div>
</div>
