{# GEO Explorer — Error State (API failure with retry) #}
{% macro error_state(message='数据加载失败', retry_url=none) -%}
<div class="text-center py-12">
    <svg class="w-12 h-12 mx-auto text-red-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <p class="mt-3 text-red-600">{{ message }}</p>
    {% if retry_url %}
    <button class="mt-3 px-4 py-2 bg-primary text-white rounded-lg cursor-pointer"
            hx-get="{{ retry_url }}" hx-target="#main-content" hx-swap="innerHTML">重试</button>
    {% endif %}
</div>
{%- endmacro %}
