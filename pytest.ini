[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    migration: database migration tests
    real_platform: tests that consume real AI platform API quota (gated by ENABLE_REAL_PLATFORM_TESTS)
    real_single_platform: single platform × 1 template smoke test
    real_all_platforms: all platforms × all templates manual acceptance only
filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore:.*InsecureKeyLengthWarning.*
