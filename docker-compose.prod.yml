# GEO Explorer — Production Docker Compose
version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      - COOKIE_SECURE=true
    volumes:
      - app_storage:/app/storage
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A src.celery_app worker -l info -Q geo_default -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - app_storage:/app/storage
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A src.celery_app beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geo}
      POSTGRES_DB: geo_explorer
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  redis_data:
  app_storage:
  certs:

networks:
  internal:
    driver: bridge
