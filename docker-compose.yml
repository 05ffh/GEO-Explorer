services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]
    volumes: ["./src:/app/src"]

  worker:
    build: .
    command: celery -A src.collector.tasks worker --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    volumes: ["./src:/app/src"]

  beat:
    build: .
    command: celery -A src.collector.tasks beat --loglevel=info
    env_file: .env
    depends_on: [db, redis]
    volumes: ["./src:/app/src"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geo_explorer
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  test_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geo_test
      POSTGRES_PASSWORD: geo_test
      POSTGRES_DB: geo_explorer_test
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
